<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Experiment 10 - Weather using Simulated Geolocation</title>
    <style>
      body {
        font-family: Arial, sans-serif;
        background: #e7f0ff;
        padding: 20px;
      }
      h1 {
        text-align: center;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        margin-top: 15px;
      }
      th,
      td {
        border: 1px solid #444;
        padding: 10px;
        text-align: center;
      }
      th {
        background: #a9c9ff;
      }
      .box {
        background: #fff;
        padding: 20px;
        border-radius: 8px;
      }
    </style>
  </head>
  <body>
    <h1>Experiment 10 - Fetch Weather Data Using Simulated Location</h1>
    <div class="box">
      <button onclick="showWeather()">Show Simulated Weather</button>
      <div id="weatherOutput"></div>
    </div>

    <script>
      // Task 1
      function getUserLocation() {
        return { latitude: 40.7128, longitude: -74.006 };
      }

      // Task 2
      function fetchWeatherData(latitude, longitude) {
        const weatherConditions = ["Sunny", "Cloudy", "Rainy", "Snowy"];
        const forecast = [];
        const date = new Date();

        for (let i = 0; i < 3; i++) {
          forecast.push({
            date: date.toLocaleDateString(),
            temperature: (Math.random() * 45 - 10).toFixed(1),
            condition:
              weatherConditions[
                Math.floor(Math.random() * weatherConditions.length)
              ],
            humidity: Math.random().toFixed(2) * 100,
            latitude,
            longitude,
          });
          date.setDate(date.getDate() + 1);
        }
        return forecast;
      }

      // Task 3 + Task 4
      function showWeather() {
        const loc = getUserLocation();
        const data = fetchWeatherData(loc.latitude, loc.longitude);

        console.log(data); // Console Output

        let output = `
    <h3>Simulated Weather for Latitude: ${loc.latitude} | Longitude: ${loc.longitude}</h3>
    <table>
      <tr>
        <th>Date</th><th>Latitude</th><th>Longitude</th>
        <th>Condition</th><th>Temperature (°C)</th><th>Humidity (%)</th>
      </tr>`;

        data.forEach((w) => {
          output += `
      <tr>
        <td>${w.date}</td><td>${w.latitude}</td><td>${w.longitude}</td>
        <td>${w.condition}</td><td>${w.temperature}</td><td>${w.humidity}</td>
      </tr>`;
        });
        output += "</table>";

        document.getElementById("weatherOutput").innerHTML = output;
      }
    </script>
  </body>
</html>
