<!DOCTYPE html>
<html>
  <body>
    <canvas
      id="myCanvas"
      width="400"
      height="300"
      style="border: 1px solid black"
    ></canvas>

    <script>
      // Access the canvas and its 2D context
      const canvas = document.getElementById("myCanvas");
      const ctx = canvas.getContext("2d");

      let x = 10; // starting position

      // Animation function
      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height); // clear previous frame

        ctx.fillStyle = "blue";
        ctx.fillRect(x, 100, 50, 50); // draw a moving square

        x += 2; // move square horizontally

        requestAnimationFrame(animate); // repeat animation
      }

      animate(); // start animation
    </script>
  </body>
</html>
