<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Advanced GSAP Animations</title>

    <!-- ✅ GSAP CDN -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
      body {
        font-family: Arial;
        text-align: center;
        background: #f2f2f2;
      }

      h2 {
        margin-top: 40px;
      }

      .container {
        margin-top: 20px;
      }

      /* ✅ MULTIPLE BOXES */
      .box {
        width: 60px;
        height: 60px;
        background: steelblue;
        display: inline-block;
        margin: 10px;
      }

      /* ✅ TIMELINE BOXES */
      .box1 {
        background: crimson;
      }
      .box2 {
        background: green;
      }

      /* ✅ PATH BALL */
      .path-container {
        position: relative;
        height: 150px;
        background: #ddd;
        margin: 20px;
        overflow: hidden;
      }

      .ball {
        width: 30px;
        height: 30px;
        background: orange;
        border-radius: 50%;
        position: absolute;
        left: 0;
        top: 60px;
      }

      button {
        padding: 10px 20px;
        margin: 15px;
        cursor: pointer;
        border: none;
        background: black;
        color: white;
      }
    </style>
  </head>

  <body>
    <h1>✅ Advanced GSAP Animations Output</h1>

    <!-- ✅ MULTIPLE ELEMENT ANIMATION -->
    <h2>1. Multiple Elements Animation</h2>
    <div class="container">
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
      <div class="box"></div>
    </div>
    <button onclick="multiAnimation()">Start Multiple Animation</button>

    <!-- ✅ TIMELINE ANIMATION -->
    <h2>2. Timeline Animation</h2>
    <div class="container">
      <div class="box box1"></div>
      <div class="box box2"></div>
    </div>
    <button onclick="timelineAnimation()">Start Timeline</button>

    <!-- ✅ PATH / CUSTOM MOTION ANIMATION -->
    <h2>3. Path / Motion Animation</h2>
    <div class="path-container">
      <div class="ball" id="ball"></div>
    </div>
    <button onclick="pathAnimation()">Start Path Animation</button>

    <script>
      // ✅ 1. MULTIPLE ELEMENTS WITH STAGGER
      function multiAnimation() {
        gsap.to(".box", {
          x: 200,
          duration: 1,
          stagger: 0.3,
          yoyo: true,
          repeat: 1,
        });
      }

      // ✅ 2. TIMELINE ANIMATION
      function timelineAnimation() {
        const tl = gsap.timeline();

        tl.to(".box1", { x: 200, duration: 1 }).to(".box2", {
          y: 80,
          duration: 1,
        });
      }

      // ✅ 3. PATH / CUSTOM MOTION
      function pathAnimation() {
        gsap.to("#ball", {
          x: 300,
          duration: 2,
          ease: "power2.inOut",
          yoyo: true,
          repeat: 1,
        });
      }
    </script>
  </body>
</html>
