<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      /* Hero Section */
      .hero {
        background-image: linear-gradient(to bottom, #33ccff, #ff99cc);
        background-size: 100% 300px;
        background-position: 0% 100%;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        color: #fff;
      }
      .hero h1 {
        font-size: 48px;
        font-weight: bold;
        letter-spacing: 10px;
        text-transform: uppercase;
      }
      .hero h1 span {
        display: block;
        animation: rgb-text 5s infinite;
      }
      .hero p {
        font-size: 24px;
        font-weight: bold;
        color: #fff;
      }
      .hero button {
        background-color: #33ccff;
        border: none;
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      .hero button:hover {
        background-color: #ff99cc;
      } /* Skills Section
*/
      .skills {
        background-color: #fff;
        padding: 20px;
      }
      .skills h2 {
        font-size: 24px;
        font-weight: bold;
        color: #333;
      }
      .skills ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .skills li {
        margin-bottom: 10px;
      }
      .skills i {
        font-size: 24px;
        color: #333;
      }
      .skills span {
        font-size: 18px;
        color: #666;
      } /* Projects
Section */
      .projects {
        background-color: #fff;
        padding: 20px;
      }
      .projects h2 {
        font-size: 24px;
        font-weight: bold;
        color: #333;
      }
      .projects ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }
      .projects li {
        margin-bottom: 20px;
      }
      .projects img {
        width: 100%;
        height: 150px;
        object-fit: cover;
        border-radius: 10px;
      }
      .projects h3 {
        font-size: 18px;
        font-weight: bold;
        color: #333;
      }
      .projects p {
        font-size: 14px;
        color: #666;
      }
      .projects button {
        background-color: #33ccff;
        border: none;
        padding: 10px 20px;
        font-size: 18px;
        font-weight: bold;
        cursor: pointer;
      }
      .projects button:hover {
        background-color: #ff99cc;
      }
    </style>
  </head>
  <body>
    <!-- Hero Section -->
    <div class="hero">
      <h1><span>Neon</span> <span>Arcade</span></h1>
      <p>Coding like a Pro, Gaming like a Boss!</p>
      <button>Let's Get Coding!</button>
    </div>
    <!-- Skills Section -->
    <div class="skills">
      <h2>Skills</h2>
      <ul>
        <li><i class="icon-html"></i> <span>HTML</span></li>
        <li><i class="icon-css"></i> <span>CSS</span></li>
        <li><i class="icon-js"></i> <span>JavaScript</span></li>
      </ul>
    </div>
    <!-- Projects Section -->
    <div class="projects">
      <h2>Projects</h2>
      <ul>
        <li>
          <img src="project1.jpg" alt="Project 1" />
          <h3>Project 1</h3>
          <p>Description of Project 1</p>
          <button>View Project</button>
        </li>
        <li>
          <img src="project2.jpg" alt="Project 2" />
          <h3>Project 2</h3>
          <p>Description of Project 2</p>
          <button>View Project</button>
        </li>
      </ul>
    </div>
  </body>
</html>
