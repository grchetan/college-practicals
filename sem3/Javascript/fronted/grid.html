<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>

    <style>
      .parent {
        height: 600px;
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        grid-template-rows: repeat(4, 1fr);
        gap: 8px;
        border: 1px solid;
        padding: 30px;
      }
      .items {
        border: 1px solid black;
      }

      .div1 {
        grid-column-start: 1;
        grid-column-end: 5;
      }

      .div2 {
        grid-column-start: 1;
        grid-column-end: 2;
        grid-row-start: 2;
        grid-row-end: 4;
      }

      .div3 {
        grid-column-start: 2;
        grid-column-end: 3;
        grid-row-start: 2;
      }

      .div4 {
        grid-column-start: 3;
        grid-row-start: 2;
      }

      .div5 {
        grid-column-start: 2;
        grid-column-end: 4;
        grid-row-start: 3;
      }

      .div6 {
        grid-column-start: 1;
        grid-column-end: 4;
        grid-row-start: 4;
      }
    </style>
  </head>
  <body>
    <div class="parent">
      <div class="items div1">1</div>
      <div class="items div2">2</div>
      <div class="items div3">3</div>
      <div class="items div4">4</div>
      <div class="items div5">5</div>
      <div class="items div6">6</div>
    </div>
  </body>
</html>
